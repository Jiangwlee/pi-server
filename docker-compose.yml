services:
  auth-server:
    build:
      context: .
      dockerfile: packages/server/docker/Dockerfile
    image: ${PI_SERVER_IMAGE:-pi-server:local}
    environment:
      PI_ROLE: auth-server
      PORT: 3001
      AUTH_SERVER_TOKEN: ${AUTH_SERVER_TOKEN}
      TZ: ${TZ:-Asia/Shanghai}
      NODE_USE_ENV_PROXY: "1"
    ports:
      - "${PI_AUTH_PORT:-3001}:3001"
    volumes:
      - ${HOME}/.pi/agent/auth.json:/root/.pi/agent/auth.json:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3001/auth')
          .then(r=>process.exit((r.status===401||r.ok)?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s

  pi-server:
    image: ${PI_SERVER_IMAGE:-pi-server:local}
    depends_on:
      auth-server:
        condition: service_healthy
    environment:
      PI_ROLE: pi-server
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET}
      PI_SERVER_DATA: /app/data
      AUTH_PROXY_URL: http://auth-server:3001
      AUTH_PROXY_TOKEN: ${AUTH_PROXY_TOKEN}
      PUBLIC_SERVER_URL: ${PI_PUBLIC_SERVER_URL:-http://localhost:3000}
      FRONTEND_URL: ${PI_FRONTEND_URL:-http://localhost:3100}
      TZ: ${TZ:-Asia/Shanghai}
      HTTP_PROXY: ${PI_HTTP_PROXY:-}
      HTTPS_PROXY: ${PI_HTTPS_PROXY:-}
      http_proxy: ${PI_HTTP_PROXY:-}
      https_proxy: ${PI_HTTPS_PROXY:-}
      NO_PROXY: ${PI_NO_PROXY:-localhost,127.0.0.1,::1},auth-server,pi-auth-server,pi-server,host.docker.internal
      no_proxy: ${PI_NO_PROXY:-localhost,127.0.0.1,::1},auth-server,pi-auth-server,pi-server,host.docker.internal
      NODE_USE_ENV_PROXY: "1"
      TEST_USER_EMAIL: ${TEST_USER_EMAIL:-test-user@gmail.com}
      TEST_USER_PASSWORD: ${TEST_USER_PASSWORD:-test-pass-123}
      TEST_USER_LOGIN: ${TEST_USER_LOGIN:-test-user}
    ports:
      - "${PI_SERVER_PORT:-3000}:3000"
    volumes:
      - pi_server_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000/auth/me')
          .then(r=>process.exit((r.status===401||r.ok)?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/docker/Dockerfile
      args:
        PI_SERVER_URL: http://pi-server:3000
    image: ${PI_FRONTEND_IMAGE:-pi-frontend:local}
    environment:
      PI_SERVER_URL: http://pi-server:3000
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${PI_FRONTEND_PORT:-3100}:3000"
    depends_on:
      pi-server:
        condition: service_healthy

volumes:
  pi_server_data:
